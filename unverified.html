<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unverified Zone</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --grandmaster: #6a0dad; /* Dark Purple */
            --master: #2980b9;      /* Blue */
            --expert: #ff69b4; /* Pink Sauce */
        }

        .bucket-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 32px 0 14px 0;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .bucket-header:first-of-type { margin-top: 10px; }

        .bucket-header img {
            height: 46px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
        }

        .bucket-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .bucket-count {
            margin-left: auto;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .level-entry {
            position: relative;
            z-index: 1;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .level-entry::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.3);
            z-index: -1;
            transform: scale(1.1);
        }

        .level-entry:hover { transform: translateX(5px); }


        .bucket-high   .level-entry, .bucket-high   .bucket-header { border-left: 5px solid var(--grandmaster); }
        .bucket-medium .level-entry, .bucket-medium .bucket-header { border-left: 5px solid var(--master); }
        .bucket-low    .level-entry, .bucket-low    .bucket-header { border-left: 5px solid var(--expert); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="assets/logo.webp" class="nav-logo" alt="Logo"></a>
        <div class="nav-links">
            <div class="dropdown">
                <button class="dropbtn">Lists <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="/mainlist"><i class="fas fa-list-ol"></i> Main List</a>
                    <a href="/expert"><i class="fas fa-expand-arrows-alt"></i> Extended List</a>
                    <a href="/unverified"><i class="fas fa-question-circle"></i> Unverified Zone</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn">Leaderboard <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="/leaderboard"><i class="fas fa-user"></i> Individual</a>
                    <a href="/countries"><i class="fas fa-globe-americas"></i> Countries</a>
                </div>
            </div>

            <div class="dropdown dropdown-right">
                <button class="dropbtn">Socials <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="https://dsc.gg/appelcord" target="_blank"><i class="fab fa-discord"></i> Discord</a>
                </div>
            </div>

            <div class="dropdown dropdown-right">
                <button class="dropbtn">More <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="https://github.com/ProgramminguyFromScratch/GMZ" target="_blank"><i class="fab fa-github"></i> GitHub Repo</a>
                    <a href="/guidelines"><i class="fas fa-file-alt"></i> Submission Guidelines</a>
                    <a href="/submit"><i class="fa-solid fa-trophy"></i> Submit a Record</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div id="loading-overlay">Loading...</div>
            <div id="list-view"></div>
        </main>

        <aside id="sidebar">
            <a href="/submit" class="submit-btn" style="margin-bottom: 25px;">Submit a Record</a>
            <h3>Filter Skills</h3>
            <div id="tag-filters"></div>
        </aside>
    </div>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const unverifiedSheetGid = "1899417734";

        const BUCKETS = [
            { 
                key: "high", 
                cssClass: "bucket-high", 
                match: ["grandmaster i", "grandmaster ii", "grandmaster iii", "grandmaster iv", "grandmaster v+"], 
                label: "Grandmaster Zone", 
                diffAsset: "Grandmaster" 
            },
            { 
                key: "medium", 
                cssClass: "bucket-medium", 
                match: ["low master", "mid master", "high master", "master"], 
                label: "Master Zone", 
                diffAsset: "Master" 
            },
            { 
                key: "low", 
                cssClass: "bucket-low", 
                match: ["low expert", "mid expert", "high expert", "expert"], 
                label: "Expert Zone", 
                diffAsset: "Expert" 
            },
        ];

        let activeTags = [];
        window.DATA = { levels: [] };

        function safeText(val) { return val ? String(val).trim() : ""; }
        function parseSkills(raw) { return raw ? raw.split(/\r?\n|,/).map(s => s.trim()).filter(Boolean) : []; }

        function getBucket(level) {
            const d = level.difficulty.toLowerCase().trim();
            return BUCKETS.find(b => b.match.some(m => d.includes(m))) || null;
        }

        function mapRowToLevel(row) {
            const firstColHeader = Object.keys(row)[0];
            const levelId = safeText(row[firstColHeader]);
            const acronym = safeText(row["Acronym"]);
            const pts = safeText(row["Points"]);
            
            return {
                id: levelId || acronym,
                name: safeText(row["Name"] || row["name"]),
                author: safeText(row["Creator(s)"] || row["Author"]),
                difficulty: safeText(row["Difficulty"]),
                points: (pts && pts !== "0") ? pts : "TBD", 
                quality: safeText(row["Quality"]),
                _skillsArray: parseSkills(row["Skills Needed"]).map(s => s.toLowerCase()),
                img: acronym ? `assets/thumbs/${acronym.toLowerCase()}.png` : "assets/thumbs/Noimageavailable.png"
            };
        }

        function renderLevels() {
            const filtered = DATA.levels.filter(lvl => 
                activeTags.every(t => lvl._skillsArray.includes(t.toLowerCase()))
            );

            let html = "";
            BUCKETS.forEach(bucket => {
                const levels = filtered.filter(lvl => getBucket(lvl)?.key === bucket.key);
                if (levels.length === 0) return;

                html += `
                <div class="${bucket.cssClass}">
                    <div class="bucket-header">
                        <img src="assets/diffs/${bucket.diffAsset}.png" onerror="this.style.opacity='0.5'" alt="">
                        <span class="bucket-title">${bucket.label}</span>
                        <span class="bucket-count">${levels.length} Levels</span>
                    </div>
                    ${levels.map(lvl => `
                        <div class="level-entry" onclick="window.location.href='/level?id=${encodeURIComponent(lvl.id)}'" style="--bg-image: url('${lvl.img}')">
                            <img class="level-thumb" src="${lvl.img}" onerror="this.src='assets/thumbs/Noimageavailable.png'">
                            <div class="level-info" style="padding: 0 12px; min-width: 0;">
                                <div class="level-name">${lvl.name || "Untitled"}</div>
                                <div class="level-meta">by ${lvl.author}</div>
                                <div class="level-meta" style="color:var(--accent); font-weight:700;">${lvl.points} ${lvl.points === 'TBD' ? '' : 'pts'}</div>
                            </div>
                            <div class="level-difficulty-slot" style="display:flex; gap:5px; margin-left: auto; padding-right:15px;">
                                ${lvl.quality ? `<img src="assets/quality/${lvl.quality.trim()}.svg" class="diff-icon-small">` : ''}
                                ${lvl.difficulty ? `<img src="assets/diffs/${lvl.difficulty.trim()}.png" class="diff-icon-small">` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            });
            document.getElementById("list-view").innerHTML = html || "<p style='padding:20px;'>No unverified levels found with matching difficulties.</p>";
        }

        async function init() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${unverifiedSheetGid}`);
                const text = await res.text();
                const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
                
                DATA.levels = data.map(mapRowToLevel);

                const tagSet = new Set();
                DATA.levels.forEach(l => l._skillsArray.forEach(s => tagSet.add(s)));
                const container = document.getElementById("tag-filters");
                
                Array.from(tagSet).sort().forEach(tag => {
                    const btn = document.createElement("button");
                    btn.className = "tag-btn";
                    btn.textContent = tag;
                    btn.onclick = () => {
                        btn.classList.toggle("active-tag");
                        activeTags = Array.from(document.querySelectorAll(".active-tag")).map(b => b.textContent);
                        renderLevels();
                    };
                    container.appendChild(btn);
                });

                document.getElementById("loading-overlay").style.display = "none";
                renderLevels();
            } catch (e) {
                document.getElementById("loading-overlay").textContent = "Error loading data.";
            }
        }
        window.onload = init;
    </script>
</body>
</html>
