<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unverified Zone</title>
    <link rel="icon" type="image/png" href="assets/diffs/Grandmaster V.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="gmzCache.js"></script>
    <style>
        :root {
            --grandmaster: #6a0dad; /* Dark Purple */
            --master: #2980b9;      /* Blue */
            --expert: #ff69b4; /* Pink Sauce */
            --other: #64748b;  /* Muted Gray */
        }

        #main-layout {
            grid-template-columns: 1fr;
        }

        .bucket-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 32px 0 14px 0;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .bucket-header:first-of-type { margin-top: 10px; }

        .bucket-header img {
            height: 46px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
        }

        .bucket-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .bucket-count {
            margin-left: auto;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .level-entry {
            position: relative;
            z-index: 1;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .level-entry::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.3);
            z-index: -1;
            transform: scale(1.1);
        }

        .level-entry:hover { transform: translateX(5px); }


        .bucket-high   .level-entry, .bucket-high   .bucket-header { border-left: 5px solid var(--grandmaster); }
        .bucket-medium .level-entry, .bucket-medium .bucket-header { border-left: 5px solid var(--master); }
        .bucket-low    .level-entry, .bucket-low    .bucket-header { border-left: 5px solid var(--expert); }
        .bucket-other  .level-entry, .bucket-other  .bucket-header { border-left: 5px solid var(--other); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="assets/logo.webp" class="nav-logo" alt="Logo"></a>
        <div class="nav-links">
            <div class="dropdown">
                <button class="dropbtn">Lists <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="/mainlist"><i class="fas fa-list-ol"></i> Main List</a>
                    <a href="/expert"><i class="fas fa-expand-arrows-alt"></i> Extended List</a>
                    <a href="/unverified"><i class="fas fa-question-circle"></i> Unverified Zone</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn">Leaderboard <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="/leaderboard"><i class="fas fa-user"></i> Individual</a>
                    <a href="/countries"><i class="fas fa-globe-americas"></i> Countries</a>
                </div>
            </div>

            <div class="dropdown dropdown-right">
                <button class="dropbtn">Socials <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="https://discord.gg/H8QkgPEuKw" target="_blank"><i class="fab fa-discord"></i> Discord</a>
                </div>
            </div>

            <div class="dropdown dropdown-right">
                <button class="dropbtn">More <i class="fas fa-caret-down"></i></button>
                <div class="dropdown-content">
                    <a href="https://github.com/ProgramminguyFromScratch/GMZ" target="_blank"><i class="fab fa-github"></i> GitHub Repo</a>
                    <a href="/guidelines"><i class="fas fa-file-alt"></i> Submission Guidelines</a>
                    <a href="/submit"><i class="fa-solid fa-trophy"></i> Submit a Record</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
                <label for="sort-selector" style="font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);">Sort By</label>
                <select id="sort-selector" onchange="renderLevels()" style="background: var(--bg-page); color: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-family: 'Montserrat'; cursor: pointer; font-weight: 600; outline: none;">
                    <option value="default">DEFAULT</option>
                    <option value="quality">QUALITY</option>
                </select>
            </div>
            <div id="loading-overlay">Loading...</div>
            <div id="list-view"></div>
        </main>
    </div>

    <script>
        const spreadsheetId = "10yZLCN80B0ExwiY8E5Y5GB95NV1T5UI69vLYywtg_J0";
        const unverifiedSheetGid = "1899417734";

        const BUCKETS = [
            { 
                key: "high", 
                cssClass: "bucket-high", 
                match: (d) => d.includes("grandmaster"), 
                label: "Grandmaster Difficulty", 
                diffAsset: "Grandmaster" 
            },
            { 
                key: "medium", 
                cssClass: "bucket-medium", 
                match: (d) => d.includes("master") && !d.includes("grandmaster"), 
                label: "Master Difficulty", 
                diffAsset: "Master" 
            },
            { 
                key: "low", 
                cssClass: "bucket-low", 
                match: (d) => d.includes("expert"), 
                label: "Expert Difficulty", 
                diffAsset: "Expert" 
            },
            { 
                key: "other", 
                cssClass: "bucket-other", 
                match: () => false, 
                label: "Other / Ungraded", 
                diffAsset: "Unrated" 
            },
        ];

        window.DATA = { levels: [] };

        const QUALITY_RANK = { "basic": 0, "good": 1, "inspired": 2, "stellar": 3, "mythic": 4 };
        function qualityRank(q) {
            const key = (q || "").toString().trim().toLowerCase();
            return QUALITY_RANK.hasOwnProperty(key) ? QUALITY_RANK[key] : -1;
        }

        function safeText(val) { return val ? String(val).trim() : ""; }

        function getBucket(level) {
            const d = level.difficulty.toLowerCase().trim();
            return BUCKETS.find(b => b.match(d)) || BUCKETS.find(b => b.key === "other");
        }

        function mapRowToLevel(row, rowIndex) {
            const firstColHeader = Object.keys(row)[0];
            const levelId = safeText(row[firstColHeader]);
            const acronym = safeText(row["Acronym"]);
            return {
                id: levelId || acronym,
                rank: rowIndex + 1,
                name: safeText(row["Name"] || row["name"]),
                author: safeText(row["Creator(s)"] || row["Author"]),
                difficulty: safeText(row["Estimated Difficulty"]),
                quality: safeText(row["Quality"]),
                img: `assets/thumbs/${encodeURIComponent(levelId || acronym)}.jpg`
            };
        }

        function renderLevels() {
            const filtered = DATA.levels;

            const sortType = document.getElementById('sort-selector') ? document.getElementById('sort-selector').value : 'default';

            let html = "";
            BUCKETS.forEach(bucket => {
                const levels = filtered.filter(lvl => getBucket(lvl)?.key === bucket.key);
                if (levels.length === 0) return;

                if (sortType === 'quality') {
                    levels.sort((a, b) => qualityRank(b.quality) - qualityRank(a.quality));
                }

                html += `
                <div class="${bucket.cssClass}">
                    <div class="bucket-header">
                        <img src="assets/diffs/${bucket.diffAsset}.png" onerror="this.style.opacity='0.5'" alt="">
                        <span class="bucket-title">${bucket.label}</span>
                        <span class="bucket-count">${levels.length} Levels</span>
                    </div>
                    ${levels.map(lvl => `
                        <div class="level-entry" onclick="window.location.href='/level?id=${encodeURIComponent(lvl.id)}'" style="--bg-image: url('${lvl.img}')">
                            <img class="level-thumb" src="${lvl.img}" onerror="this.src='assets/thumbs/Noimageavailable.png'">
                            <div class="level-rank">#${lvl.rank}</div>
                            <div class="level-info" style="padding: 0 12px; min-width: 0;">
                                <div class="level-name">${lvl.name || "Untitled"}</div>
                                <div class="level-meta">by ${lvl.author}</div>
                            </div>
                            <div class="level-difficulty-slot" style="display:flex; gap:5px; margin-left: auto; padding-right:15px;">
                                ${lvl.quality ? `<img src="assets/quality/${lvl.quality.trim()}.svg" class="diff-icon-small">` : ''}
                                ${lvl.difficulty ? `<img src="assets/diffs/${lvl.difficulty.trim()}.png" class="diff-icon-small">` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            });
            document.getElementById("list-view").innerHTML = html || "<p style='padding:20px;'>No unverified levels found with matching difficulties.</p>";
        }

        async function init() {
            try {
                const data = await GMZCache.fetchCsvCached(GMZCache.sheetCsvUrl(spreadsheetId, unverifiedSheetGid));

                DATA.levels = data.map((row, i) => mapRowToLevel(row, i));

                document.getElementById("loading-overlay").style.display = "none";
                renderLevels();
            } catch (e) {
                document.getElementById("loading-overlay").textContent = "Error loading data.";
            }
        }
        window.onload = init;
    </script>
</body>
</html>
